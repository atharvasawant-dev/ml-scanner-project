services:
  - type: web
    name: foodscanner-ai
    runtime: docker
    rootDir: foodscanner-ai
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: foodscanner-db
          property: connectionString
      - key: FOODSCANNER_OCR_ENGINE
        value: tesseract
  - type: web
    name: foodscanner-mobile
    runtime: static
    rootDir: foodscanner-mobile
    buildCommand: npm install && npm run build:web
    staticPublishPath: dist
    envVars:
      - key: EXPO_PUBLIC_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
databases:
  - name: foodscanner-db
    plan: free
    databaseName: foodscanner_ai
    user: foodscanner
